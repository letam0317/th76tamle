<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Audit - Kiểm soát kho 5S</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js (CDN) - defer để chạy sau khi DOM tải xong -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Thư viện quét mã vạch / QR (CDN) -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    /* Cuộn mượt cho danh sách dropdown */
    .dropdown-scroll { scrollbar-width: thin; }
    .dropdown-scroll::-webkit-scrollbar { width: 6px; }
    .dropdown-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
    [x-cloak] { display: none !important; }
  </style>
</head>

<body class="bg-slate-100 min-h-screen py-6 px-4">

  <!--
    ===========================================================
    HƯỚNG DẪN NHANH (dành cho người dùng):
    1. Mở file google-script.gs, làm theo hướng dẫn để lấy đường link Web App.
    2. Dán đường link đó vào biến WEBHOOK_URL ở cuối file này (phần <script>).
    3. Mở file index.html này bằng trình duyệt (nên dùng điện thoại để quét mã & chụp ảnh).
       * Lưu ý: Camera chỉ bật được khi mở qua https:// hoặc localhost (yêu cầu bảo mật của trình duyệt).
    ===========================================================
  -->

  <div
    x-data="auditForm()"
    class="max-w-xl mx-auto"
  >
    <!-- Tiêu đề -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-slate-800">Form Audit - Kiểm soát kho 5S</h1>
      <p class="text-sm text-slate-500 mt-1">Ghi nhận hiện trạng kiểm soát kho theo tiêu chuẩn 5S</p>
    </div>

    <!-- Thẻ chứa form -->
    <form
      @submit.prevent="guiBaoCao()"
      class="bg-white rounded-3xl shadow-lg shadow-slate-200 p-6 sm:p-8 space-y-6"
    >

      <!-- ===== MỤC 1: Hiện trạng (Ghi chú, không bắt buộc) ===== -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">
          1. Hiện trạng (ghi chú)
        </label>
        <textarea
          x-model="form.hienTrang"
          rows="3"
          placeholder="Mô tả nhanh hiện trạng ghi nhận (không bắt buộc)..."
          class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 focus:outline-none transition"
        ></textarea>
      </div>

      <!-- ===== MỤC 2: Khu vực / vị trí + nút quét mã vạch ===== -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">
          2. Khu vực hoặc vị trí ghi nhận <span class="text-red-500">*</span>
        </label>
        <div class="flex gap-2">
          <input
            type="text"
            x-model="form.viTri"
            placeholder="Nhập hoặc quét mã vạch vị trí..."
            class="flex-1 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 focus:outline-none transition"
          />
          <!-- Nút bật camera quét mã -->
          <button
            type="button"
            @click="moCamera()"
            title="Quét mã vạch / QR"
            class="shrink-0 w-12 h-12 flex items-center justify-center rounded-2xl bg-blue-600 text-white hover:bg-blue-700 active:scale-95 transition"
          >
            <!-- Icon mã vạch -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 5h2v14H3V5zm4 0h1v14H7V5zm3 0h2v14h-2V5zm4 0h1v14h-1V5zm3 0h2v14h-2V5z"/>
            </svg>
          </button>
        </div>

        <!-- Khung hiển thị camera khi quét -->
        <div x-show="dangQuet" x-cloak class="mt-3 rounded-2xl overflow-hidden border border-slate-200 bg-black">
          <div id="reader" class="w-full"></div>
          <button
            type="button"
            @click="dongCamera()"
            class="w-full py-2.5 bg-slate-800 text-white text-sm font-medium hover:bg-slate-700 transition"
          >
            Đóng camera
          </button>
        </div>
      </div>

      <!-- ===== MỤC 3: Hạng mục 5S (Searchable Dropdown) ===== -->
      <div x-data="{ }" @click.outside="moDropdown = false">
        <label class="block text-sm font-semibold text-slate-700 mb-2">
          3. Thuộc hạng mục <span class="text-red-500">*</span>
        </label>
        <div class="relative">
          <input
            type="text"
            x-model="tuKhoa"
            @focus="moDropdown = true"
            @input="moDropdown = true"
            placeholder="Gõ để tìm (ví dụ: hsd, fefo, rác...)"
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 focus:outline-none transition"
          />

          <!-- Danh sách kết quả lọc -->
          <div
            x-show="moDropdown"
            x-cloak
            class="absolute z-20 mt-1 w-full max-h-72 overflow-y-auto dropdown-scroll rounded-2xl border border-slate-200 bg-white shadow-xl"
          >
            <template x-for="(muc, idx) in danhSachLoc()" :key="idx">
              <div
                @click="chonHangMuc(muc)"
                class="px-4 py-3 text-sm text-slate-700 hover:bg-blue-50 cursor-pointer border-b border-slate-100 last:border-0"
                :class="{ 'bg-blue-50 font-medium': form.hangMuc === muc }"
                x-text="muc"
              ></div>
            </template>
            <div x-show="danhSachLoc().length === 0" class="px-4 py-3 text-sm text-slate-400">
              Không tìm thấy hạng mục phù hợp
            </div>
          </div>
        </div>

        <!-- Hạng mục đã chọn -->
        <p x-show="form.hangMuc" x-cloak class="mt-2 text-xs text-green-600">
          ✓ Đã chọn: <span x-text="form.hangMuc" class="font-medium"></span>
        </p>
      </div>

      <!-- ===== MỤC 4: Hình ảnh / clip ===== -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">
          4. Hình ảnh / clip tại thời điểm ghi nhận <span class="text-red-500">*</span>
        </label>

        <div class="grid grid-cols-2 gap-2">
          <!-- Nút CHỤP ẢNH TRỰC TIẾP (mở camera live trong trang) -->
          <button
            type="button"
            @click="moChupAnh()"
            class="flex flex-col items-center justify-center rounded-2xl border-2 border-blue-300 bg-blue-50 px-3 py-6 hover:bg-blue-100 active:scale-[0.98] transition text-center"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-blue-500 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/>
            </svg>
            <span class="text-sm text-blue-700 font-semibold">Chụp ảnh trực tiếp</span>
            <span class="text-xs text-blue-400 mt-0.5">mở camera</span>
          </button>

          <!-- Nút CHỌN TỪ THƯ VIỆN / kéo thả -->
          <label
            @dragover.prevent="keoVao = true"
            @dragleave.prevent="keoVao = false"
            @drop.prevent="keoVao = false; xuLyFile($event.dataTransfer.files)"
            :class="keoVao ? 'border-blue-400 bg-blue-50' : 'border-slate-300 bg-slate-50'"
            class="flex flex-col items-center justify-center rounded-2xl border-2 border-dashed px-3 py-6 cursor-pointer hover:bg-slate-100 transition text-center"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-slate-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5V18a2.25 2.25 0 002.25 2.25h13.5A2.25 2.25 0 0021 18v-1.5M16.5 7.5L12 3m0 0L7.5 7.5M12 3v13.5"/>
            </svg>
            <span class="text-sm text-slate-600 font-medium">Chọn từ thư viện</span>
            <span class="text-xs text-slate-400 mt-0.5">hoặc kéo thả</span>
            <input
              type="file"
              accept="image/*,video/*"
              multiple
              class="hidden"
              @change="xuLyFile($event.target.files)"
            />
          </label>
        </div>

        <!-- Preview ảnh thu nhỏ -->
        <div x-show="files.length > 0" x-cloak class="grid grid-cols-3 gap-2 mt-3">
          <template x-for="(f, i) in files" :key="i">
            <div class="relative group">
              <template x-if="f.loai === 'image'">
                <img :src="f.preview" class="w-full h-24 object-cover rounded-xl border border-slate-200" />
              </template>
              <template x-if="f.loai === 'video'">
                <video :src="f.preview" playsinline webkit-playsinline muted preload="metadata" class="w-full h-24 object-cover rounded-xl border border-slate-200"></video>
              </template>
              <!-- Nút xoá -->
              <button
                type="button"
                @click="xoaFile(i)"
                class="absolute -top-2 -right-2 w-6 h-6 rounded-full bg-red-500 text-white text-xs flex items-center justify-center shadow hover:bg-red-600"
              >✕</button>
            </div>
          </template>
        </div>
      </div>

      <!-- ===== Modal CAMERA: chụp ảnh / quay video trực tiếp ===== -->
      <div x-show="dangChupAnh" x-cloak class="fixed inset-0 z-50 bg-black/90 flex flex-col items-center justify-center p-4">
        <!-- Chuyển chế độ Ảnh / Video -->
        <div class="flex gap-1 mb-3 bg-white/10 rounded-full p-1" :class="dangQuay ? 'opacity-40 pointer-events-none' : ''">
          <button type="button" @click="datCheDo(false)"
            :class="!cheDoVideo ? 'bg-white text-slate-800' : 'text-white'"
            class="rounded-full px-4 py-1.5 text-sm font-medium transition">📷 Ảnh</button>
          <button type="button" @click="datCheDo(true)"
            :class="cheDoVideo ? 'bg-white text-slate-800' : 'text-white'"
            class="rounded-full px-4 py-1.5 text-sm font-medium transition">🎥 Video</button>
        </div>

        <!-- playsinline + webkit-playsinline + muted: khoá iOS không cho nhảy Fullscreen Player đè mất nút Chụp/Xong -->
        <video x-ref="video" playsinline webkit-playsinline autoplay muted class="w-full max-w-md rounded-2xl bg-black"></video>
        <canvas x-ref="canvas" class="hidden"></canvas>

        <!-- Đồng hồ khi đang quay -->
        <p x-show="dangQuay" x-cloak class="mt-3 text-red-400 text-sm font-semibold flex items-center gap-2">
          <span class="inline-block w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></span>
          <span x-text="'Đang quay ' + Math.floor(giayQuay/60) + ':' + String(giayQuay%60).padStart(2,'0')"></span>
        </p>
        <p x-show="!dangQuay" class="text-white/70 text-xs mt-3"
           x-text="soAnhChup > 0 ? ('Đã ghi ' + soAnhChup + ' mục — bấm Xong khi đủ') : (cheDoVideo ? 'Bấm nút đỏ để bắt đầu quay (1080p)' : 'Đưa camera vào đối tượng rồi bấm Chụp')"></p>

        <div class="flex items-center gap-4 mt-4">
          <button type="button" @click="dongChupAnh()" x-show="!dangQuay"
            class="rounded-2xl bg-white/20 text-white font-medium px-5 py-3 text-sm hover:bg-white/30 transition">Xong</button>

          <!-- Nút chính: chụp ảnh / quay / dừng -->
          <template x-if="!cheDoVideo">
            <button type="button" @click="chupAnh()"
              class="rounded-full bg-white w-16 h-16 flex items-center justify-center shadow-lg ring-4 ring-white/40 active:scale-95 transition">
              <span class="block w-12 h-12 rounded-full bg-blue-600"></span>
            </button>
          </template>
          <template x-if="cheDoVideo">
            <button type="button" @click="dangQuay ? dungQuay() : batDauQuay()"
              class="rounded-full bg-white w-16 h-16 flex items-center justify-center shadow-lg ring-4 ring-white/40 active:scale-95 transition">
              <span x-show="!dangQuay" class="block w-12 h-12 rounded-full bg-red-600"></span>
              <span x-show="dangQuay" x-cloak class="block w-7 h-7 rounded bg-red-600"></span>
            </button>
          </template>

          <button type="button" @click="doiCamera()" x-show="!dangQuay"
            class="rounded-2xl bg-white/20 text-white font-medium px-4 py-3 text-sm hover:bg-white/30 transition" title="Đổi camera trước/sau">⇄</button>
        </div>
      </div>

      <!-- ===== Overlay tiến trình nén video tải lên ===== -->
      <div x-show="dangNen" x-cloak class="fixed inset-0 z-50 bg-black/80 flex flex-col items-center justify-center p-6 text-center">
        <svg class="w-10 h-10 text-white animate-spin mb-3" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"></path>
        </svg>
        <p class="text-white text-sm" x-text="tienTrinhNen || 'Đang xử lý video...'"></p>
        <p class="text-white/50 text-xs mt-1">Video lớn (50–100MB) đang được hạ xuống 720p để gửi nhanh & nhẹ Drive.</p>
      </div>

      <!-- ===== Nút gửi báo cáo ===== -->
      <button
        type="submit"
        :disabled="dangGui || dangNen"
        class="w-full rounded-2xl bg-blue-600 text-white font-semibold py-3.5 text-sm shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-[0.99] transition disabled:opacity-60 disabled:cursor-not-allowed"
      >
        <span x-show="!dangGui && !dangNen">GỬI BÁO CÁO</span>
        <span x-show="dangGui" x-cloak>Đang gửi, vui lòng đợi...</span>
        <span x-show="dangNen && !dangGui" x-cloak>Đang xử lý video...</span>
      </button>

      <!-- Thông báo kết quả -->
      <div
        x-show="thongBao.noiDung"
        x-cloak
        :class="thongBao.loai === 'ok' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200'"
        class="rounded-2xl border px-4 py-3 text-sm text-center"
        x-text="thongBao.noiDung"
      ></div>

    </form>

    <p class="text-center text-xs text-slate-400 mt-4">Hệ thống kiểm soát kho 5S</p>
  </div>

  <!-- ===========================================================
       PHẦN LOGIC (Alpine.js)
       =========================================================== -->
  <script>
    // 👉 BƯỚC QUAN TRỌNG: Dán đường link Google Web App của bạn vào đây
    const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbzIE6E68VYxS0Zm1vj8Ttfd790-JYolO1C4rMoEPj7FdNOWLPb23QpUHgIZ2T_dlZPJRQ/exec';

    // Danh sách 31 hạng mục 5S (nạp cố định)
    const DANH_SACH_5S = [
      "Không phát sinh vi phạm hạng mục",
      "Hàng hóa phải được sắp xếp gọn gàng, trưng bày đủ theo sức chứa của thùng, khay, hộp, mâm kệ hoặc pallet.",
      "Hạn sử dụng thấp trưng bày lớp ngoài cùng, HSD cao trưng bày bên trong (nguyên tắc FEFO)",
      "Nếu trưng bày nhiều lớp cùng loại sản phẩm, phải có miếng lót carton giữa các lớp.",
      "Khi trưng bày hàng hóa tuyệt đối không đè lên hoặc che khuất sản phẩm khác.",
      "Hàng hóa số lượng nhiều dạng thùng khi trưng bày ở khu vực soạn hàng phải được rọc băng keo tất cả các thùng nhưng không được cắt nắp",
      "Khi trưng bày hàng hóa trong kho, tất cả hàng hoá phải được để trên kệ hoặc pallet, không được để dưới nền kho hoặc để trực tiếp lên mặt kệ sắt sẽ ảnh hưởng đến ngoại quan sản phẩm. Phải có thùng hoặc khay chứa sản phẩm để hạn chế bụi bẩn sản phẩm",
      "Bàn làm việc và khu vực phụ trách: phải được vệ sinh hằng ngày vào cuối mỗi ca.",
      "CCDC, VPP (pallet, xe soạn hàng, các loại rổ, thùng đóng đơn, thùng giấy tái chế, thùng rác, rác phải phân loại...), vật dụng cá nhân (chai/ly nước uống, balo, túi,...) đặt đúng vị trí lưu trữ, trả về đúng nơi quy định sau khi sử dụng. Vệ sinh và dọn rác sạch sẽ sau khi sử dụng.",
      "Trên sàn kho/hàng hóa: không được để rác (chai/ly nước, hộp cơm, giấy vụn, giấy chèn, lõi băng keo, lõi giấy in, bịch nilon...). Nếu có rác ở sàn kho, trên hàng hóa hoặc CCDC nhân viên phải nhặt đem đến thùng rác gần nhất để bỏ",
      "Tất cả hàng hoá nhập vào kho đóng đơn đều phải được dán mã SKU nếu không có barcode trên sản phẩm.",
      "CCDC phải được sử dụng đúng mục đích và không dùng cho việc cá nhân. Đảm bảo CCDC, VPP luôn trong trạng thái sẵn sàng để sử dụng.",
      "Lấy hết hàng trong thùng mới lấy qua thùng khác. Lấy theo thứ tự từ trái sang phải, từ ngoài vào trong và từ trên xuống dưới",
      "Lấy luôn thùng nếu NV là người soạn hàng cuối cùng của thùng đó đem về khu vực soạn hàng để tái sử dụng hoặc rọc thùng để vào nơi quy định nếu không thể tận dụng.",
      "Hàng hóa để tạm chờ xử lý ngoài khu vực hoạch định phải gán thông tin người phụ trách, mục đích, thời gian xử lý hoàn tất.",
      "Sản phẩm hoặc thùng hàng lẻ (không còn nguyên băng keo/hiện trạng bảo quản từ NCC) và sản phẩm ít tác động: phải được che phủ bằng thùng có nắp đậy (nhựa hoặc carton), vệ sinh bụi bám tránh ảnh hưởng ngoại quan.",
      "Tất cả sản phẩm ở kho chỉ được lưu trữ ở những vị trí thể hiện rõ thông tin và phải để đúng nơi có tồn sản phẩm đó trên hệ thống.",
      "Vi phạm kiểm soát ra vào kho tổng hoặc đóng mở cổng để ra vào hoặc nhập/xuất hàng không đúng quy định mà không có sự đồng ý của cấp Quản lý",
      "Đơn trữ trong rổ chờ bàn giao không được để vượt quá mép rổ.",
      "Trong thời gian làm việc cần tập trung và không làm ảnh hưởng đến hiệu quả công việc. Đối với thiết bị cá nhân cần tuân thủ quy định: Điện thoại: Không sử dụng cho mục đích cá nhân.  Tai nghe: Tuyệt đối không đeo tai nghe trong phạm vi kho Loa: Không mở loa cá nhân khi làm việc",
      "Không tự ý di chuyển ra khỏi kho ngoại trừ giờ nghỉ buổi trưa, giờ nghỉ buổi chiều hoặc được sự đồng ý của cấp quản lý.  Trước khi ra khỏi cổng NV có trách nhiệm tìm đến bảo vệ để yêu cầu kiểm tra, soát người. Nếu không có bảo vệ tại vị trí, NV phải chờ và tuyệt đối không tự ý di chuyển ra khỏi kho.",
      "Tắt các thiết bị điện khi không sử dụng.",
      "Không có hàng lẻ để qua ngày ở khu vực trữ Warehouse.",
      "Hàng hoá nhập trữ bắt buộc quấn màng PE, quấn đủ quấn đúng đảm bảo chắc chắn. Hàng phải được xếp gọn và lọt lòng pallet. Hàng nặng chất thấp (không quá 1,3m), hàng nhẹ chất cao nhưng không vượt quá chiều cao quy định",
      "Ăn uống, nghỉ ngơi đúng thời gian và đúng nơi quy định",
      "Không trữ hay trưng bày hàng hóa, công cụ, văn phòng phẩm,... chắn lối đi hoặc tại khu vực không được phép",
      "Đùa giỡn, chửi tục, làm việc chuyên trong giờ làm việc",
      "Vận hành xe nâng an toàn",
      "Thao tác vật lý với hàng hóa (trưng bày, luân chuyển, hạn sử dụng) đúng theo yêu cầu của hệ thống và ngược lại.",
      "Có kỳ kiểm kê được giao nhưng không kiểm hoặc chưa hoàn tất đợt kiểm kê trong ngày",
      "Nhân viên kiểm đếm sai số lượng thực tế",
      "Bảo quản hàng hóa, công cụ dụng cụ và tài sản cố định"
    ];

    function auditForm() {
      return {
        // ---- Trạng thái dữ liệu ----
        form: { hienTrang: '', viTri: '', hangMuc: '' },
        files: [],          // danh sách file ảnh/video kèm preview
        tuKhoa: '',         // từ khoá đang gõ ở mục 3
        moDropdown: false,
        dangQuet: false,    // đang bật camera quét mã?
        keoVao: false,      // đang kéo file vào vùng thả?
        dangGui: false,
        thongBao: { loai: '', noiDung: '' },
        _scanner: null,     // đối tượng camera quét mã
        dangChupAnh: false, // đang mở camera?
        _cameraStream: null,// luồng camera đang dùng
        soAnhChup: 0,       // số ảnh/clip đã ghi trong phiên camera này
        cameraSau: true,    // true = camera sau (environment), false = camera trước
        cheDoVideo: false,  // false = chụp ảnh, true = quay video
        dangQuay: false,    // đang quay video?
        _recorder: null, _videoChunks: [], _quayTimer: null, giayQuay: 0,
        dangNen: false, tienTrinhNen: '',   // trạng thái nén video tải lên (50-100MB -> 720p)
        MAX_VIDEO_MB: 100,  // > 100MB: chặn; 50-100MB: tự hạ 720p; <=50MB: giữ nguyên
        NGUONG_NEN_MB: 50,
        MAX_ANH_PX: 2560,   // cạnh dài tối đa của ảnh (~2K) để gửi nhanh, nhẹ Drive

        // ---- Mục 3: Lọc danh sách theo từ khoá ----
        danhSachLoc() {
          const k = (this.tuKhoa || '').toLowerCase().trim();
          if (!k) return DANH_SACH_5S;
          return DANH_SACH_5S.filter(m => m.toLowerCase().includes(k));
        },
        chonHangMuc(muc) {
          this.form.hangMuc = muc;
          this.tuKhoa = muc;
          this.moDropdown = false;
        },

        // ---- Mục 2: Quét mã vạch / QR ----
        async moCamera() {
          this.dangQuet = true;
          // Chờ Alpine hiển thị khung #reader rồi mới khởi tạo camera
          await this.$nextTick();
          try {
            this._scanner = new Html5Qrcode("reader");
            await this._scanner.start(
              { facingMode: "environment" },          // ưu tiên camera sau
              { fps: 10, qrbox: { width: 250, height: 250 } },
              (decodedText) => {                        // quét thành công
                this.form.viTri = decodedText;
                this.dongCamera();                      // tắt camera tiết kiệm pin
              },
              () => { /* bỏ qua lỗi từng khung hình */ }
            );
          } catch (err) {
            this.dangQuet = false;
            alert("Không mở được camera. Vui lòng cho phép quyền camera và mở trang qua https.\n" + err);
          }
        },
        async dongCamera() {
          if (this._scanner) {
            try { await this._scanner.stop(); this._scanner.clear(); } catch (e) {}
            this._scanner = null;
          }
          this.dangQuet = false;
        },

        // ---- Mục 4: Chụp ảnh trực tiếp bằng camera (getUserMedia) ----
        async moChupAnh() {
          await this.dongCamera();              // nhả camera quét mã (nếu đang bật) — iOS chỉ cho 1 luồng camera
          this.dangChupAnh = true;
          this.soAnhChup = 0;
          await this.$nextTick();
          await this._batCamera();
        },
        async _batCamera() {
          if (this._cameraStream) { this._cameraStream.getTracks().forEach(t => t.stop()); this._cameraStream = null; }
          const KT = { width: { ideal: 1920 }, height: { ideal: 1080 } };   // ~1080p (~2K) để clip gọn
          // Thử LẦN LƯỢT chặt -> lỏng: chỉ dùng "ideal" thì trình duyệt được phép
          // tự rơi về cam trước, nên phải thử "exact" trước rồi mới nới dần.
          const huong = this.cameraSau ? 'environment' : 'user';
          const cacRangBuoc = [
            { facingMode: { exact: huong }, ...KT },
            { facingMode: { ideal: huong }, ...KT },
            KT,
          ];
          let stream = null, loiCuoi = null;
          for (const video of cacRangBuoc) {
            try { stream = await navigator.mediaDevices.getUserMedia({ video, audio: this.cheDoVideo }); break; }
            catch (err) { loiCuoi = err; }
          }
          // Muốn cam sau nhưng vẫn bị trả về cam trước -> chọn ĐÍCH DANH deviceId cam sau
          // (enumerateDevices chỉ có nhãn sau khi đã được cấp quyền ở stream trên).
          if (stream && this.cameraSau) {
            try {
              const track = stream.getVideoTracks()[0];
              const st = track.getSettings ? track.getSettings() : {};
              const dangTruoc = st.facingMode === 'user' || /front|user|trước|truoc/i.test(track.label || '');
              if (dangTruoc) {
                const dsCam = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
                const camSau = dsCam.find(d => /back|rear|environment|sau/i.test(d.label || ''));
                if (camSau) {
                  const s2 = await navigator.mediaDevices.getUserMedia({
                    video: { deviceId: { exact: camSau.deviceId }, ...KT },
                    audio: this.cheDoVideo
                  });
                  stream.getTracks().forEach(t => t.stop());
                  stream = s2;
                }
              }
            } catch { /* không chọn được đích danh thì giữ stream đang có */ }
          }
          if (!stream) {
            this.dangChupAnh = false;
            alert("Không mở được camera. Hãy cho phép quyền camera/mic và mở trang qua HTTPS.\n" + loiCuoi);
            return;
          }
          this._cameraStream = stream;
          const v = this.$refs.video;
          // Khoá chạy INLINE trên iOS (đặt cả property lẫn attribute NGAY TRƯỚC play():
          // thiếu là Safari ép nhảy Fullscreen Player native, đè mất nút Chụp/Xong)
          v.muted = true;
          v.playsInline = true;
          v.setAttribute('muted', '');
          v.setAttribute('playsinline', '');
          v.setAttribute('webkit-playsinline', '');
          v.srcObject = stream;
          await v.play().catch(() => {});
        },
        async doiCamera() {
          if (this.dangQuay) return;            // đang quay thì không đổi
          this.cameraSau = !this.cameraSau;
          await this._batCamera();
        },
        async datCheDo(video) {                 // chuyển Ảnh <-> Video (cần bật lại stream để thêm/bỏ mic)
          if (this.dangQuay || this.cheDoVideo === video) return;
          this.cheDoVideo = video;
          await this._batCamera();
        },
        chupAnh() {
          const v = this.$refs.video;
          if (!v || !v.videoWidth) return;
          const c = this.$refs.canvas;
          c.width = v.videoWidth;
          c.height = v.videoHeight;
          c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
          this._veNhanThoiGian(c);                 // nhãn thời gian lúc chụp
          const dataUrl = c.toDataURL('image/jpeg', 0.9);
          const ten = 'chup_' + new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19) + '.jpg';
          this.files.push({ ten: ten, loai: 'image', mime: 'image/jpeg', preview: dataUrl, base64: dataUrl, tg: Date.now() });
          this.soAnhChup++;
        },
        // ---- Quay video trong app (1080p) ----
        batDauQuay() {
          if (!this._cameraStream) return;
          const mime = ['video/mp4;codecs=h264,aac', 'video/webm;codecs=vp9,opus', 'video/webm']
            .find(m => window.MediaRecorder && MediaRecorder.isTypeSupported(m)) || '';
          try {
            this._recorder = new MediaRecorder(this._cameraStream, mime ? { mimeType: mime, videoBitsPerSecond: 4000000 } : undefined);
          } catch (e) { alert('Trình duyệt không hỗ trợ quay video: ' + e); return; }
          this._videoChunks = [];
          this._recorder.ondataavailable = (ev) => { if (ev.data && ev.data.size) this._videoChunks.push(ev.data); };
          this._recorder.onstop = () => {
            const type = (this._recorder && this._recorder.mimeType) || 'video/webm';
            const blob = new Blob(this._videoChunks, { type });
            const ext = /mp4/.test(type) ? 'mp4' : 'webm';
            const reader = new FileReader();
            reader.onload = (e) => {
              this.files.push({
                ten: 'quay_' + new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19) + '.' + ext,
                loai: 'video', mime: type.split(';')[0], preview: e.target.result, base64: e.target.result, tg: Date.now()
              });
              this.soAnhChup++;
            };
            reader.readAsDataURL(blob);
          };
          this._recorder.start();
          this.dangQuay = true; this.giayQuay = 0;
          this._quayTimer = setInterval(() => { this.giayQuay++; }, 1000);
        },
        dungQuay() {
          if (this._recorder && this.dangQuay) { try { this._recorder.stop(); } catch (e) {} }
          this.dangQuay = false;
          if (this._quayTimer) { clearInterval(this._quayTimer); this._quayTimer = null; }
        },

        // Chuỗi nhãn: "hh:mm:ss dd-mm-yyyy |Audit Hasaki"
        _chuoiThoiGian() {
          const d = new Date(), p = (n) => String(n).padStart(2, '0');
          return p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds()) + ' ' +
                 p(d.getDate()) + '-' + p(d.getMonth() + 1) + '-' + d.getFullYear() + ' |Audit Hasaki';
        },
        // Vẽ nhãn thời gian ở góc dưới-trái ảnh trên canvas
        _veNhanThoiGian(canvas) {
          const ctx = canvas.getContext('2d');
          const text = this._chuoiThoiGian();
          const fs = Math.max(16, Math.round(canvas.width * 0.032));   // cỡ chữ theo bề ngang ảnh
          const pad = Math.round(fs * 0.5);
          ctx.font = '700 ' + fs + 'px Arial, sans-serif';
          ctx.textBaseline = 'alphabetic';
          const tw = ctx.measureText(text).width;
          const x = pad, baseY = canvas.height - pad;
          ctx.fillStyle = 'rgba(0,0,0,0.55)';                          // nền mờ cho dễ đọc
          ctx.fillRect(x - pad / 2, baseY - fs - pad / 2, tw + pad, fs + pad);
          ctx.fillStyle = '#FFD400';                                   // chữ vàng
          ctx.fillText(text, x, baseY - pad / 2);
        },
        dongChupAnh() {
          if (this.dangQuay) this.dungQuay();
          if (this._cameraStream) { this._cameraStream.getTracks().forEach(t => t.stop()); this._cameraStream = null; }
          if (this.$refs.video) this.$refs.video.srcObject = null;
          this.dangChupAnh = false;
        },

        // ---- Mục 4: Xử lý file ảnh/video ----
        xuLyFile(fileList) {
          for (const file of Array.from(fileList)) {
            if ((file.type || '').startsWith('video')) this._themVideo(file);
            else this._themAnh(file);
          }
        },
        // Ảnh: thu nhỏ về <=2K + gắn nhãn thời gian (lúc tải lên) + nén JPEG
        _themAnh(file) {
          const tg = file.lastModified || Date.now();          // thời gian gốc của ảnh
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              let w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
              const max = this.MAX_ANH_PX;
              if (Math.max(w, h) > max) { const s = max / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
              const c = document.createElement('canvas'); c.width = w; c.height = h;
              c.getContext('2d').drawImage(img, 0, 0, w, h);
              this._veNhanThoiGian(c);
              const dataUrl = c.toDataURL('image/jpeg', 0.85);
              this.files.push({ ten: (file.name || 'anh').replace(/\.[^.]+$/, '') + '.jpg', loai: 'image', mime: 'image/jpeg', preview: dataUrl, base64: dataUrl, tg });
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        },
        // Video: <=50MB giữ nguyên; 50-100MB tự hạ 720p; >100MB chặn
        async _themVideo(file) {
          const tg = file.lastModified || Date.now();
          const mb = file.size / (1024 * 1024);
          if (mb > this.MAX_VIDEO_MB) {
            alert('Video nặng ' + mb.toFixed(0) + 'MB, vượt giới hạn ' + this.MAX_VIDEO_MB + 'MB.\nVui lòng quay clip ngắn hơn.');
            return;
          }
          let blob = file;
          if (mb > this.NGUONG_NEN_MB) {
            try { this.dangNen = true; blob = await this._nenVideo720(file); }
            catch (err) { alert('Không nén được video, gửi nguyên gốc. (' + err + ')'); blob = file; }
            finally { this.dangNen = false; this.tienTrinhNen = ''; }
          }
          const reader = new FileReader();
          reader.onload = (e) => {
            this.files.push({ ten: file.name || 'video.mp4', loai: 'video', mime: (blob.type || file.type || 'video/mp4').split(';')[0], preview: e.target.result, base64: e.target.result, tg });
          };
          reader.readAsDataURL(blob);
        },
        // Transcode -> 720p bằng canvas.captureStream + MediaRecorder (mất ~ thời lượng clip)
        _nenVideo720(file) {
          return new Promise((resolve, reject) => {
            const v = document.createElement('video');
            v.muted = true; v.playsInline = true; v.src = URL.createObjectURL(file);
            v.onloadedmetadata = () => {
              const scale = Math.min(1, 1280 / Math.max(v.videoWidth, v.videoHeight));
              const w = Math.round(v.videoWidth * scale), h = Math.round(v.videoHeight * scale);
              const c = document.createElement('canvas'); c.width = w; c.height = h;
              const ctx = c.getContext('2d');
              const mime = ['video/mp4;codecs=h264', 'video/webm;codecs=vp9', 'video/webm'].find(m => MediaRecorder.isTypeSupported(m)) || '';
              const rec = new MediaRecorder(c.captureStream(30), mime ? { mimeType: mime, videoBitsPerSecond: 2500000 } : undefined);
              const chunks = [];
              rec.ondataavailable = (ev) => { if (ev.data && ev.data.size) chunks.push(ev.data); };
              rec.onstop = () => { URL.revokeObjectURL(v.src); resolve(new Blob(chunks, { type: (rec.mimeType || 'video/webm').split(';')[0] })); };
              let raf;
              const draw = () => { if (!v.paused && !v.ended) { ctx.drawImage(v, 0, 0, w, h); this.tienTrinhNen = 'Đang nén video 720p... ' + Math.round((v.currentTime / (v.duration || 1)) * 100) + '%'; raf = requestAnimationFrame(draw); } };
              rec.start();
              v.play().then(() => draw()).catch(reject);
              v.onended = () => { cancelAnimationFrame(raf); setTimeout(() => { try { rec.stop(); } catch (e) {} }, 200); };
            };
            v.onerror = () => reject('không mở được video');
          });
        },
        xoaFile(i) { this.files.splice(i, 1); },

        // ---- Gửi báo cáo ----
        async guiBaoCao() {
          this.thongBao = { loai: '', noiDung: '' };

          // Kiểm tra các mục bắt buộc (*)
          if (!this.form.viTri.trim()) {
            this.thongBao = { loai: 'err', noiDung: 'Vui lòng nhập Khu vực / vị trí ghi nhận (Mục 2).' };
            return;
          }
          if (!this.form.hangMuc.trim()) {
            this.thongBao = { loai: 'err', noiDung: 'Vui lòng chọn Hạng mục 5S (Mục 3).' };
            return;
          }
          if (this.files.length === 0) {
            this.thongBao = { loai: 'err', noiDung: 'Vui lòng đính kèm ít nhất 1 hình ảnh / clip (Mục 4).' };
            return;
          }
          if (this.dangNen) {
            this.thongBao = { loai: 'err', noiDung: 'Đang xử lý video, vui lòng đợi giây lát rồi gửi lại.' };
            return;
          }

          this.dangGui = true;

          // Thời gian vi phạm = mốc thời gian sớm nhất của ảnh/video; nếu không có thì = lúc gửi form
          const mocs = this.files.map(f => f.tg).filter(Boolean);
          const tgViPham = mocs.length ? Math.min(...mocs) : Date.now();
          const p = (n) => String(n).padStart(2, '0');
          const d = new Date(tgViPham);
          const thoiGianViPham = d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' +
                                 p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());

          // Gói dữ liệu gửi sang Google Apps Script
          const duLieu = {
            hienTrang: this.form.hienTrang.trim(),
            viTri: this.form.viTri.trim(),
            hangMuc: this.form.hangMuc.trim(),
            thoiGianViPham: thoiGianViPham,
            hinhAnh: this.files.map(f => ({ ten: f.ten, mime: f.mime, base64: f.base64 }))
          };

          try {
            // Dùng Content-Type text/plain để tránh lỗi CORS preflight với Apps Script
            const res = await fetch(WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(duLieu)
            });
            const ketQua = await res.json();

            if (ketQua.status === 'success') {
              this.thongBao = { loai: 'ok', noiDung: '✓ Gửi báo cáo thành công! Dữ liệu đã được lưu.' };
              // Reset form sau khi gửi
              this.form = { hienTrang: '', viTri: '', hangMuc: '' };
              this.tuKhoa = '';
              this.files = [];
            } else {
              throw new Error(ketQua.message || 'Lỗi không xác định từ máy chủ.');
            }
          } catch (err) {
            this.thongBao = { loai: 'err', noiDung: '✗ Gửi thất bại: ' + err.message + '. Kiểm tra lại WEBHOOK_URL.' };
          } finally {
            this.dangGui = false;
          }
        }
      };
    }
  </script>
